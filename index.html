<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗峰娱乐 · 包间管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;padding:16px;max-width:1200px;margin:0 auto}
h1{color:#f5c518;font-size:20px;margin-bottom:4px}
.sub{color:#888;font-size:12px;margin-bottom:16px}
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #333}
.nav a{padding:6px 14px;border-radius:6px;background:#222;color:#aaa;cursor:pointer;text-decoration:none;font-size:13px}
.nav a:hover{background:#333;color:#fff}
.nav a.act{background:#f5c518;color:#111;font-weight:600}
.page{display:none}
.page.act{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat{background:#1a1a1a;border-radius:8px;padding:14px;border-left:3px solid #f5c518}
.stat .l{color:#888;font-size:11px}
.stat .v{font-size:22px;font-weight:700;margin-top:2px}
.stat .v.gr{color:#3fb950}
.stat .v.rd{color:#f85149}
.stat .v.yl{color:#f5c518}
.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.room{border-radius:8px;padding:14px;background:#1a1a1a;border:1px solid #2a2a2a}
.room.occ{border-color:#f5c518}
.room .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.room .n{font-weight:600;font-size:14px}
.tag{font-size:10px;padding:1px 6px;border-radius:3px;background:#333}
.tag.p{background:#003791;color:#fff}
.tag.s{background:#e60012;color:#fff}
.tag.g{background:#333;color:#aaa}
.room .s{margin-bottom:6px;font-size:12px}
.s.gr{color:#3fb950}
.s.rd{color:#f85149}
.room .i{font-size:12px;color:#888;margin-bottom:2px}
.btn{padding:6px 12px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-family:inherit}
.btn.y{background:#f5c518;color:#111;font-weight:600}
.btn.g{background:#1a7f37;color:#fff}
.btn.r{background:#bd2c2c;color:#fff}
.btn.b{background:#222;color:#aaa;border:1px solid #333}
.btn.s{padding:4px 8px;font-size:11px}
.mt10{margin-top:10px}
.gap6{display:flex;gap:6px;flex-wrap:wrap}
.mb10{margin-bottom:10px}
.form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form.one{grid-template-columns:1fr}
.form label{display:block;color:#888;font-size:11px;margin-bottom:3px}
.form input,.form select{width:100%;padding:6px 10px;border-radius:5px;border:1px solid #333;background:#111;color:#eee;font-size:13px;font-family:inherit}
.form input:focus{border-color:#f5c518;outline:none}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;color:#888;border-bottom:1px solid #333;font-weight:600}
.tbl td{padding:8px 10px;border-bottom:1px solid #222}
.hist{border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;padding:12px;margin-bottom:6px}
.hist .h{display:flex;justify-content:space-between;margin-bottom:6px}
.hist .d{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;font-size:12px;color:#888}
.hist .d strong{color:#eee}
.bigtime{font-size:40px;font-weight:700;text-align:center;padding:16px 0;font-variant-numeric:tabular-nums;color:#f5c518}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:100}
.overlay.o{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:440px;max-width:94vw;padding:20px}
.modal h3{font-size:16px;margin-bottom:14px;color:#f5c518}
.settle{background:#111;border-radius:6px;padding:14px;margin:10px 0}
.settle .r{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.settle .r.t{border-top:2px solid #333;margin-top:6px;padding-top:8px;font-size:16px;font-weight:700;color:#f5c518}
.emp{padding:40px;text-align:center;color:#666}
.emp .i{font-size:40px;margin-bottom:8px}
.emp .t{font-size:14px}
.qadd{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;margin-bottom:10px}
.qadd button{padding:6px;border:1px solid #333;border-radius:4px;background:#111;color:#eee;cursor:pointer;font-size:12px;font-family:inherit;}
.qadd button:hover{border-color:#f5c518}
h2{font-size:16px;margin-bottom:10px}
</style>
</head>
<body>

<h1>🎮 暗峰娱乐</h1>
<div class="sub">包间管理系统</div>

<div class="nav" id="nav">
  <a data-page="dash">📊 仪表盘</a>
  <a data-page="board">📺 状态板</a>
  <a data-page="rooms">🛋️ 包间</a>
  <a data-page="timer">⏱️ 计时</a>
  <a data-page="order">🧾 订单</a>
  <a data-page="hist">📜 历史</a>
</div>
<div class="gap6 mb10">
  <button class="btn b s" onclick="exp()">📤 导出</button>
  <button class="btn b s" onclick="document.getElementById('imp').click()">📥 导入</button>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="imp(event)">
  <button class="btn r s" onclick="if(confirm('确定重置？')){localStorage.clear();location.reload()}">🗑️ 重置</button>
</div>

<div id="dash" class="page act"></div>
<div id="board" class="page"></div>
<div id="rooms" class="page"></div>
<div id="timer" class="page"></div>
<div id="order" class="page"></div>
<div id="hist" class="page"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h3 id="mtitle">标题</h3>
    <div id="mbody"></div>
  </div>
</div>

<script>
// ===== 数据层 =====
var KEY = 'af_data';
var DEF = {
  rooms: [
    {id:'r1',name:'PS5 1号厅',type:'ps5',rate:15,deposit:0},
    {id:'r2',name:'PS5 2号厅',type:'ps5',rate:15,deposit:0},
    {id:'r3',name:'PS4 1号厅',type:'ps4',rate:10,deposit:0},
    {id:'r4',name:'PS4 2号厅',type:'ps4',rate:10,deposit:0},
    {id:'r5',name:'Switch厅',type:'switch',rate:12,deposit:0}
  ],
  sessions: [],
  orders: [],
  seq: {r:6,s:1,o:1}
};

function load() {
  var d = DEF;
  try {
    var r = localStorage.getItem(KEY);
    if (r) { d = JSON.parse(r); for (var k in DEF) { if (!(k in d)) d[k] = DEF[k]; } }
  } catch(e) {}
  // 迁移旧数据: 如果旧版用了 rooms 而不是 r，转换
  if (d.seq && typeof d.seq.rooms === "number" && typeof d.seq.r !== "number") {
    d.seq.r = d.seq.rooms;
  }
  // 修复可能存在的 rNaN 房间 ID
  if (d.rooms) {
    var maxId = 0;
    for (var i = 0; i < d.rooms.length; i++) {
      var m = d.rooms[i].id.match(/^r(\d+)$/);
      if (m) { var n = parseInt(m[1]); if (n > maxId) maxId = n; }
    }
    // 给 rNaN 房间分配新 ID
    var fixCount = 0;
    for (var j = 0; j < d.rooms.length; j++) {
      if (d.rooms[j].id === 'rNaN' || d.rooms[j].id.indexOf('rNaN') >= 0) {
        fixCount++;
        d.rooms[j].id = 'r' + (maxId + fixCount);
      }
    }
    d.seq.r = Math.max(d.seq.r || 0, maxId + fixCount + 1);
  }
  return d;
}
function save(d) {
  try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) { alert('保存失败'); }
}
function D() { return load(); }

function newId(d, prefix) {
  return prefix + (d.seq[prefix]++);
}

// 工具
function fm(v) { return '¥' + Number(v).toFixed(2); }
function ft(t) { var d=new Date(t); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2); }
function fd(t) { var d=new Date(t); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function fdt(t) { return fd(t)+' '+ft(t); }
function dur(s) { var h=Math.floor(s/3600); var m=Math.floor((s%3600)/60); var s2=Math.floor(s%60); return ('0'+h).slice(-2)+':'+('0'+m).slice(-2)+':'+('0'+s2).slice(-2); }
function dbs(t1,t2) { return Math.floor((t2-t1)/1000); }
function tl(t) { var m={ps5:'PS5',ps4:'PS4',switch:'Switch',general:'通用'}; return m[t]||t; }
function tc(t) { var m={ps5:'tag p',ps4:'tag p',switch:'tag s',general:'tag g'}; return m[t]||'tag g'; }
function toast(msg,t) {
  var el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;font-size:13px;z-index:200;'+(t==='e'?'background:#bd2c2c;color:#fff':'background:#1a7f37;color:#fff');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity 0.3s'},2000);
  setTimeout(function(){el.remove()},2500);
}

// ===== 导航 =====
document.getElementById('nav').addEventListener('click', function(e) {
  var a = e.target.closest('[data-page]');
  if (!a) return;
  var p = a.dataset.page;
  document.querySelectorAll('.nav a').forEach(function(x){x.classList.remove('act')});
  a.classList.add('act');
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('act')});
  document.getElementById(p).classList.add('act');
  render(p);
});

function render(p) {
  var m = {dash:rdash, board:rboard, rooms:rrooms, timer:rtimer, order:rorder, hist:rhist};
  if (m[p]) m[p]();
}

// ===== 仪表盘 =====
function rdash() {
  var d = D();
  var rooms = d.rooms;
  var act = d.sessions.filter(function(s){return s.status==='a'});
  var today = d.sessions.filter(function(s){
    if(s.status!=='c'||!s.end) return false;
    var t=new Date(); var st=new Date(t.getFullYear(),t.getMonth(),t.getDate()).getTime();
    return s.end>=st && s.end<st+86400000;
  });
  var rev = today.reduce(function(s,x){return s+x.total},0);
  var trev = d.sessions.filter(function(s){return s.status==='c'}).reduce(function(s,x){return s+x.total},0);
  var h = '<div class="stats">';
  h += '<div class="stat"><div class="l">包间总数</div><div class="v yl">'+rooms.length+'</div><div class="l">空闲 '+(rooms.length-act.length)+' · 使用 '+act.length+'</div></div>';
  h += '<div class="stat"><div class="l">今日上机</div><div class="v gr">'+today.length+'</div><div class="l">当前 '+act.length+' 间使用</div></div>';
  h += '<div class="stat"><div class="l">今日营收</div><div class="v yl">'+fm(rev)+'</div><div class="l">累计 '+fm(trev)+'</div></div>';
  h += '<div class="stat" style="border-left-color:#a371f7"><div class="l">使用中</div><div class="v" style="color:#a371f7">'+act.length+'</div><div class="l">空闲 '+(rooms.length-act.length)+' 间</div></div>';
  h += '</div><h2>包间状态</h2><div class="rooms">';
  for (var i=0;i<rooms.length;i++) {
    var r=rooms[i];
    var s=act.find(function(x){return x.roomId===r.id});
    var occ=!!s;
    h += '<div class="room'+(occ?' occ':'')+'">';
    h += '<div class="h"><span class="n">'+r.name+'</span><span class="tag '+tc(r.type)+'">'+tl(r.type)+'</span></div>';
    h += '<div class="s '+(occ?'rd':'gr')+'">'+(occ?'● 有客':'○ 空闲')+'</div>';
    h += '<div class="i">'+r.rate+' 元/小时</div>';
    if(occ) h += '<div class="i">顾客: '+s.customer+'</div>';
    h += '<div class="gap6 mt10">';
    if(occ) h += '<button class="btn g s" onclick="navOrder(\''+s.id+'\')">🧾 订单</button><button class="btn r s" onclick="endSess(\''+s.id+'\')">💰 结账</button>';
    else h += '<button class="btn y s" onclick="startSess(\''+r.id+'\')">▶ 开台</button>';
    h += '</div></div>';
  }
  h += '</div>';
  document.getElementById('dash').innerHTML = h;
  // 启动计时更新
  for (var i=0;i<act.length;i++) updateTimer(act[i].id);
}

// ===== 状态板 =====
function rboard() {
  var d=D();
  var rooms=d.rooms;
  var act=d.sessions.filter(function(s){return s.status==='a'});
  var h = '<h2>📺 包间状态板 <span style="color:#666;font-weight:400;font-size:13px">'+new Date().toLocaleString('zh-CN',{hour12:false})+'</span></h2>';
  h += '<div class="rooms">';
  for (var i=0;i<rooms.length;i++) {
    var r=rooms[i];
    var s=act.find(function(x){return x.roomId===r.id});
    var occ=!!s;
    var bg=occ?'linear-gradient(135deg,#3d1212,#4d1a1a)':'linear-gradient(135deg,#1a3a1a,#1e4d1e)';
    var bd=occ?'2px solid #da3633':'2px solid #2ea043';
    h += '<div style="background:'+bg+';border:'+bd+';border-radius:10px;padding:20px;text-align:center;min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px">';
    h += '<div style="font-size:28px">'+(occ?'🟢':'🟢')+'</div>';
    h += '<div style="font-size:16px;font-weight:700">'+r.name+'</div>';
    h += '<div style="font-size:11px;opacity:0.7">'+tl(r.type)+'</div>';
    h += '<div style="font-size:22px;font-weight:700;color:'+(occ?'#f85149':'#3fb950')+'">'+(occ?'有客':'空闲')+'</div>';
    if(occ) h += '<div style="font-size:13px;color:#aaa">'+s.customer+'</div>';
    if(occ) h += '<div style="font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:'+(occ?'#f85149':'#3fb950')+'" id="bt-'+s.id+'">--:--:--</div>';
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('board').innerHTML = h;
  for (var i=0;i<act.length;i++) updateBoardTimer(act[i].id);
}

// ===== 包间管理 =====
function rrooms() {
  var d=D();
  var rooms=d.rooms;
  var h = '<div class="gap6 mb10"><button class="btn y" onclick="addRoom()">＋ 添加包间</button></div>';
  if(rooms.length===0) h += '<div class="emp"><div class="i">🛋️</div><div class="t">暂无包间</div></div>';
  else {
    h += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>名称</th><th>类型</th><th>费率</th><th>押金</th><th>状态</th><th>操作</th></tr></thead><tbody>';
    for (var i=0;i<rooms.length;i++) {
      var r=rooms[i];
      var s=d.sessions.find(function(x){return x.roomId===r.id&&x.status==='a'});
      h += '<tr><td><strong>'+r.name+'</strong></td><td><span class="tag '+tc(r.type)+'">'+tl(r.type)+'</span></td><td>'+r.rate+' 元/时</td><td>'+(r.deposit>0?fm(r.deposit):'无')+'</td>';
      h += '<td><span style="color:'+(s?'#f85149':'#3fb950')+'">'+(s?'有客':'空闲')+'</span></td>';
      h += '<td class="gap6"><button class="btn b s" onclick="editRoom(\''+r.id+'\')">编辑</button>';
      if(!s) h += '<button class="btn r s" onclick="delRoom(\''+r.id+'\')">删除</button>';
      h += '</td></tr>';
    }
    h += '</tbody></table></div>';
  }
  document.getElementById('rooms').innerHTML = h;
}

// ===== 计时管理 =====
rtimers = {};
function rtimer() {
  var d=D();
  var rooms=d.rooms;
  var act=d.sessions.filter(function(s){return s.status==='a'});
  var h = '<div class="stats"><div class="stat" style="border-left-color:#3fb950"><div class="l">使用中</div><div class="v gr">'+act.length+'</div><div class="l">共 '+rooms.length+' 间</div></div>';
  h += '<div class="stat" style="border-left-color:#58a6ff"><div class="l">空闲</div><div class="v yl">'+(rooms.length-act.length)+'</div><div class="l">可开台</div></div></div>';
  h += '<div class="rooms">';
  for (var i=0;i<rooms.length;i++) {
    var r=rooms[i];
    var s=act.find(function(x){return x.roomId===r.id});
    h += '<div class="room'+(s?' occ':'')+'">';
    h += '<div class="h"><span class="n">'+r.name+'</span><span class="tag '+tc(r.type)+'">'+tl(r.type)+'</span></div>';
    if(s) {
      var sec=dbs(s.start,Date.now());
      h += '<div class="bigtime" id="tm-'+s.id+'">'+dur(sec)+'</div>';
      h += '<div class="stats" style="grid-template-columns:1fr 1fr;margin-bottom:0">';
      h += '<div class="stat" style="padding:8px;border-left:0;background:transparent"><div class="l">顾客</div><div class="v" style="font-size:15px">'+s.customer+'</div></div>';
      h += '<div class="stat" style="padding:8px;border-left:0;background:transparent"><div class="l">费率</div><div class="v" style="font-size:15px">'+r.rate+' 元/时</div></div>';
      h += '</div>';
      h += '<div class="gap6 mt10"><button class="btn g s" onclick="navOrder(\''+s.id+'\')">🧾 订单</button><button class="btn r s" onclick="endSess(\''+s.id+'\')">💰 结账</button></div>';
    } else {
      h += '<div class="bigtime" style="color:#444;font-size:30px">空闲</div>';
      h += '<div class="mt10"><button class="btn y" onclick="startSess(\''+r.id+'\')">▶ 开台</button></div>';
    }
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('timer').innerHTML = h;
  for (var i=0;i<act.length;i++) updateTimer(act[i].id);
}

function updateTimer(sid) {
  if(rtimers[sid]) clearInterval(rtimers[sid]);
  function up() {
    var s=D().sessions.find(function(x){return x.id===sid});
    if(!s||s.status!=='a') return;
    var sec=dbs(s.start,Date.now());
    var el=document.getElementById('tm-'+sid);
    if(el) el.textContent=dur(sec);
    var be=document.getElementById('bt-'+sid);
    if(be) be.textContent=dur(sec);
  }
  up();
  rtimers[sid]=setInterval(up,1000);
}

function updateBoardTimer(sid) {
  function up() {
    var s=D().sessions.find(function(x){return x.id===sid});
    if(!s||s.status!=='a') return;
    var el=document.getElementById('bt-'+sid);
    if(el) el.textContent=dur(dbs(s.start,Date.now()));
  }
  up();
  setInterval(up,1000);
}

// ===== 开台 =====
function startSess(rid) {
  var r=D().rooms.find(function(x){return x.id===rid});
  if(!r) return;
  showModal('▶ 开台 — '+r.name,
    '<div class="form one"><div class="form-group"><label>顾客姓名</label><input id="scName" class="s-inp" placeholder="例如：张先生"></div></div>'+
    '<div class="form"><div class="form-group"><label>押金（选填）</label><input id="scDep" type="number" min="0" step="5" value="0" class="s-inp"></div>'+
    '<div class="form-group"><label>费率</label><input value="'+r.rate+' 元/小时" disabled class="s-inp" style="opacity:0.6"></div></div>'+
    '<div class="gap6" style="justify-content:flex-end"><button class="btn b" onclick="closeModal()">取消</button> <button class="btn y" onclick="confStart(\''+rid+'\')">▶ 确认开台</button></div>');
}

function confStart(rid) {
  var d=D();
  var name=document.getElementById('scName').value.trim()||'散客';
  var dep=parseFloat(document.getElementById('scDep').value)||0;
  var exist=d.sessions.find(function(s){return s.roomId===rid&&s.status==='a'});
  if(exist){toast('该包间已有客人','e');return;}
  var id=newId(d,'s');
  d.sessions.push({id:id,roomId:rid,customer:name,start:Date.now(),end:null,status:'a',time:0,timeFee:0,deposit:dep,orderTotal:0,total:0,discPct:0,discFix:0,actual:0,autoH:0});
  save(d);
  closeModal();
  toast('开台成功！');
  navTimer();
}

// ===== 结账 =====
function endSess(sid) {
  var d=D();
  var s=d.sessions.find(function(x){return x.id===sid});
  if(!s||s.status!=='a') return;
  var r=d.rooms.find(function(x){return x.id===s.roomId});
  if(!r) return;
  var orders=d.orders.filter(function(o){return o.sessionId===sid});
  var sec=dbs(s.start,Date.now());
  var min=Math.ceil(sec/60);
  var autoH=Math.ceil(min/60);
  var oTotal=orders.reduce(function(s2,o){return s2+o.price*o.qty},0);
  var timeFee=autoH*r.rate;
  var sub=timeFee+oTotal;
  var total=Math.max(0,sub-s.deposit);
  
  showModal('💰 结账 — '+r.name,
    '<div class="settle"><div class="r"><span>顾客</span><strong>'+s.customer+'</strong></div>'+
    '<div class="r"><span>实际上机</span><strong>'+min+' 分钟</strong></div></div>'+
    '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:12px;margin:10px 0">'+
    '<div style="color:#f5c518;font-size:12px;font-weight:600;margin-bottom:8px">⚙️ 计时设置</div>'+
    '<div class="form"><div class="form-group"><label>结算小时数</label><input id="eHours" type="number" min="0" step="0.5" value="'+autoH+'" class="s-inp" oninput="recalc(\''+sid+'\')"><div style="font-size:10px;color:#666;margin-top:2px">自动: '+autoH+' 小时</div></div>'+
    '<div class="form-group"><label>费率（元/小时）</label><input id="eRate" type="number" min="0" step="1" value="'+r.rate+'" class="s-inp" oninput="recalc(\''+sid+'\')"><div style="font-size:10px;color:#666;margin-top:2px">标准: '+r.rate+' 元/时</div></div></div></div>'+
    '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:12px;margin:10px 0">'+
    '<div style="color:#f5c518;font-size:12px;font-weight:600;margin-bottom:8px">🏷️ 折扣</div>'+
    '<div class="form"><div class="form-group"><label>折扣比例 (%)</label><input id="eDiscPct" type="number" min="0" max="100" step="1" value="0" class="s-inp" oninput="recalc(\''+sid+'\')"></div>'+
    '<div class="form-group"><label>固定减免（元）</label><input id="eDiscFix" type="number" min="0" step="1" value="0" class="s-inp" oninput="recalc(\''+sid+'\')"></div></div></div>'+
    '<div class="settle" id="setBreak"><div class="r"><span>计时费</span><strong id="lTimeFee">'+fm(timeFee)+'</strong></div>'+
    '<div class="r"><span>商品费</span><strong>'+fm(oTotal)+'</strong></div>'+(s.deposit>0?'<div class="r"><span>押金</span><strong>-'+fm(s.deposit)+'</strong></div>':'')+
    '<div class="r" id="lDiscRow" style="display:none"><span>折扣</span><strong id="lDisc" style="color:#3fb950">-¥0.00</strong></div>'+
    '<div class="r t"><span>应收</span><strong id="lTotal">'+fm(total)+'</strong></div></div>'+
    '<div class="gap6" style="justify-content:flex-end"><button class="btn b" onclick="closeModal()">取消</button> <button class="btn g" onclick="confEnd(\''+sid+'\')">✅ 确认结账</button></div>');
  
  // 存储结算数据供 recalc 使用
  var sdata = document.getElementById('setBreak');
  sdata._oTotal = oTotal;
  sdata._dep = s.deposit;
  showOverlay();
}

function recalc(sid) {
  var d=D();
  var s=d.sessions.find(function(x){return x.id===sid});
  if(!s) return;
  var r=d.rooms.find(function(x){return x.id===s.roomId});
  if(!r) return;
  var hours=parseFloat(document.getElementById('eHours').value)||0;
  var rate=parseFloat(document.getElementById('eRate').value)||0;
  var discPct=parseFloat(document.getElementById('eDiscPct').value)||0;
  var discFix=parseFloat(document.getElementById('eDiscFix').value)||0;
  var br=document.getElementById('setBreak');
  var oTotal=br._oTotal||0;
  var dep=br._dep||0;
  var timeFee=hours*rate;
  var sub=timeFee+oTotal;
  var discAmt=Math.round(sub*discPct/100*100)/100+discFix;
  var total=Math.max(0,sub-dep-discAmt);
  document.getElementById('lTimeFee').textContent=fm(timeFee);
  var dr=document.getElementById('lDiscRow');
  var de=document.getElementById('lDisc');
  if(discAmt>0){dr.style.display='flex';de.textContent='-'+fm(discAmt)}
  else dr.style.display='none';
  document.getElementById('lTotal').textContent=fm(total);
}

function confEnd(sid) {
  var d=D();
  var s=d.sessions.find(function(x){return x.id===sid});
  if(!s||s.status!=='a') return;
  var hours=document.getElementById('eHours').value;
  var rate=document.getElementById('eRate').value;
  var discPct=parseFloat(document.getElementById('eDiscPct').value)||0;
  var discFix=parseFloat(document.getElementById('eDiscFix').value)||0;
  var r=d.rooms.find(function(x){return x.id===s.roomId});
  if(!r) return;
  var end=Date.now();
  var min=Math.ceil((end-s.start)/60000);
  var autoH=Math.ceil(min/60);
  var hasH=(hours!==undefined&&hours!==null&&hours!=='');
  var hasR=(rate!==undefined&&rate!==null&&rate!=='');
  var bH=hasH?Number(hours):autoH;
  var bR=hasR?Number(rate):r.rate;
  s.end=end;
  s.status='c';
  s.totalTime=bH*60;
  s.actual=min;
  s.timeFee=bH*bR;
  var orders=d.orders.filter(function(o){return o.sessionId===sid});
  s.orderTotal=orders.reduce(function(s2,o){return s2+o.price*o.qty},0);
  s.discPct=discPct;
  s.discFix=discFix;
  var sub=s.timeFee+s.orderTotal;
  var discAmt=Math.round(sub*discPct/100*100)/100+discFix;
  s.total=Math.max(0,Math.round((sub-s.deposit-discAmt)*100)/100);
  s.customHours=bH;
  s.customRate=bR;
  s.autoH=autoH;
  save(d);
  if(rtimers[sid]){clearInterval(rtimers[sid]);delete rtimers[sid]}
  closeModal();
  toast('✅ 结账完成！应收 '+fm(s.total));
  navTimer();
}

  h2 += '<div class="stat" style="padding:8px;border-left:0;background:transparent"><div class="l">顾客</div><div class="v" style="font-size:14px">'+s.customer+'</div></div>';
  h2 += '<div class="stat" style="padding:8px;border-left:0;background:transparent"><div class="l">计时费</div><div class="v yl" style="font-size:14px" id="rfee-'+sid+'">'+fm(timeFee)+'</div></div>';
  h2 += '<div class="stat" style="padding:8px;border-left:0;background:transparent"><div class="l">商品费</div><div class="v" style="font-size:14px">'+fm(oTotal)+'</div></div>';

  h2 += '</div></div>';
  
  h2 += '<div class="room" style="margin-bottom:10px"><div class="h"><span class="n">快速添加</span></div>';
  h2 += '<div class="qadd">';
  var items=[['🥤可乐',3],['🥤雪碧',3],['💧矿泉水',2],['🔋红牛',8],['🍿爆米花',12],['🥔薯片',5],['🔌充电线',5],['🎮手柄租',10]];
  for(var i=0;i<items.length;i++){
    h2 += '<button onclick="qAdd(\''+sid+'\',\''+items[i][0].replace(/'/g,"\\'")+'\','+items[i][1]+')">'+items[i][0]+' ¥'+items[i][1]+'</button>';

  h2 += '</div>';
  h2 += '<div class="form one"><div style="display:flex;gap:6px"><input id="cName" placeholder="自定义商品" class="s-inp" style="flex:1"><input id="cPrice" type="number" min="0" step="1" placeholder="价格" class="s-inp" style="width:70px"><button class="btn y s" onclick="cAdd(\''+sid+'\')">添加</button></div></div>';

  h2 += '<div style="flex:1;min-width:260px"><div class="room"><div class="h"><span class="n">🧾 订单清单</span><button class="btn r s" onclick="endSess(\''+sid+'\')">💰 结账</button></div>';
  if(orders.length===0) h2+='<div class="emp" style="padding:20px"><div class="i">📋</div><div class="t">暂无订单</div></div>';

    for(var i=0;i<orders.length;i++){
      h2+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px">';

function swOrder(sid){curOrderSid=sid;rorder();}
function qAdd(sid,name,price){
  var d=D();
  var id=newId(d,'o');
  d.orders.push({id:id,sessionId:sid,name:name,price:price,qty:1,time:Date.now()});
  save(d);
  toast(name+' ¥'+price);
  rorder();
}
function cAdd(sid){
  var n=document.getElementById('cName').value.trim();
  var p=parseFloat(document.getElementById('cPrice').value);
  if(!n){toast('请输入商品名','e');return}
  if(!p||p<=0){toast('请输入有效价格','e');return}
  qAdd(sid,n,p);
  document.getElementById('cName').value='';
  document.getElementById('cPrice').value='';
}
function rmOrder(oid){
  var d=D();
  d.orders=d.orders.filter(function(o){return o.id!==oid});
  save(d);
  rorder();
}

// ===== 历史 =====
var histDate = new Date();
function rhist() {
  var d=D();
  var ds=fd(histDate);
  var start=new Date(ds+'T00:00:00+08:00').getTime();
  var end=start+86400000;
  var sess=d.sessions.filter(function(s){return s.status==='c'&&s.end>=start&&s.end<end});
  var rev=sess.reduce(function(s2,x){return s2+x.total},0);
  var mStart=new Date(histDate.getFullYear(),histDate.getMonth(),1).getTime();
  var mEnd=new Date(histDate.getFullYear(),histDate.getMonth()+1,1).getTime();
  var mSess=d.sessions.filter(function(s){return s.status==='c'&&s.end>=mStart&&s.end<mEnd});
  var mRev=mSess.reduce(function(s2,x){return s2+x.total},0);
  
  var h='<div class="stats"><div class="stat" style="border-left-color:#3fb950"><div class="l">'+ds+' 订单</div><div class="v gr">'+sess.length+'</div></div>';
  h+='<div class="stat" style="border-left-color:#d29922"><div class="l">'+ds+' 营收</div><div class="v yl">'+fm(rev)+'</div></div>';
  h+='<div class="stat" style="border-left-color:#58a6ff"><div class="l">本月营收</div><div class="v yl">'+fm(mRev)+'</div></div></div>';
  
  h+='<div class="gap6 mb10"><button class="btn b s" onclick="chDate(-1)">‹ 前一天</button><span style="font-size:14px;font-weight:600;padding:4px 8px">'+ds+'</span><button class="btn b s" onclick="chDate(1)">后一天 ›</button><button class="btn b s" onclick="chDate(0)">今天</button></div>';
  
  if(sess.length===0) h+='<div class="emp"><div class="i">📅</div><div class="t">暂无记录</div></div>';
  else{
    for(var i=0;i<sess.length;i++){
      var s=sess[i];
      var r=d.rooms.find(function(x){return x.id===s.roomId});
      var orders=d.orders.filter(function(o){return o.sessionId===s.id});
      var oD=orders.length>0?orders.map(function(o){return o.name+'×'+o.qty}).join('、'):'无';
      var hasDisc=s.discPct>0||s.discFix>0;
      var discT='';
      if(s.discPct>0) discT+=s.discPct+'%';
      if(s.discFix>0) discT+=(discT?'+':'')+'减¥'+s.discFix;
      
      h+='<div class="hist"><div class="h"><strong>'+(r?r.name:'已删除')+'</strong><span class="tag '+(r?tc(r.type):'tag g')+'">'+(r?tl(r.type):'')+'</span></div>';
      h+='<div class="d"><span>顾客: <strong>'+s.customer+'</strong></span>';
      h+='<span>上机: <strong>'+ft(s.start)+'</strong></span>';
      h+='<span>下机: <strong>'+ft(s.end)+'</strong></span>';
      h+='<span>时长: <strong>'+(s.actual||s.totalTime)+'分钟</strong></span>';
      h+='<span>计时: <strong>'+fm(s.timeFee)+'</strong></span>';
      h+='<span>商品: <strong>'+oD+' ('+fm(s.orderTotal)+')</strong></span>';
      if(hasDisc) h+='<span style="color:#3fb950">折扣: <strong>-'+discT+'</strong></span>';
      h+='<span style="color:#f5c518;font-weight:700">实收: <strong>'+fm(s.total)+'</strong></span></div></div>';
    }
  }
  document.getElementById('hist').innerHTML = h;
}

function chDate(delta){
  if(delta===0) histDate=new Date();
  else{var d=new Date(histDate);d.setDate(d.getDate()+delta);histDate=d}
  rhist();
}

// ===== 包间管理弹窗 =====
function addRoom(){
  showModal('＋ 添加包间',
    '<div class="form one"><div class="form-group"><label>包间名称</label><input id="rName" class="s-inp" placeholder="例如：PS5 VIP包间"></div></div>'+

    '<div class="form"><div class="form-group"><label>费率（元/小时）</label><input id="rRate" type="number" min="0" step="5" value="15" class="s-inp"></div>'+
    '<div class="form-group"><label>押金（元）</label><input id="rDep" type="number" min="0" step="10" value="0" class="s-inp"></div></div>'+

function confAddRoom(){

  var d=parseFloat(document.getElementById('rDep').value)||0;

  closeModal();

function editRoom(rid){
  var r=D().rooms.find(function(x){return x.id===rid});
  if(!r) return;
  showModal('编辑 — '+r.name,
    '<div class="form one"><div class="form-group"><label>名称</label><input id="rName" class="s-inp" value="'+r.name+'"></div></div>'+
    '<div class="form one"><div class="form-group"><label>类型</label><select id="rType" class="s-inp"><option value="ps5"'+(r.type==='ps5'?' selected':'')+'>PS5</option><option value="ps4"'+(r.type==='ps4'?' selected':'')+'>PS4</option><option value="switch"'+(r.type==='switch'?' selected':'')+'>Switch</option></select></div></div>'+
    '<div class="form"><div class="form-group"><label>费率</label><input id="rRate" type="number" min="0" step="5" value="'+r.rate+'" class="s-inp"></div>'+

}

function confEditRoom(rid){
  var n=document.getElementById('rName').value.trim();
  var t=document.getElementById('rType').value;
  var r2=parseFloat(document.getElementById('rRate').value)||15;
  var d=parseFloat(document.getElementById('rDep').value)||0;
  if(!n){toast('请输入名称','e');return}
  var data=D();
  var room=data.rooms.find(function(x){return x.id===rid});
  if(room){room.name=n;room.type=t;room.rate=r2;room.deposit=d}
  save(data);
  closeModal();
  toast('已更新');
  rrooms();
}

function delRoom(rid){
  if(!confirm('确定删除？')) return;
  var d=D();
  var act=d.sessions.find(function(s){return s.roomId===rid&&s.status==='a'});
  if(act){toast('该包间有客人，无法删除','e');return}
  d.rooms=d.rooms.filter(function(r){return r.id!==rid});
  save(d);
  toast('已删除');
  rrooms();
}

// ===== 模态框 =====
function showModal(title, body) {
  document.getElementById('mtitle').textContent = title;
  document.getElementById('mbody').innerHTML = body;
  showOverlay();
}

function showOverlay() {
  document.getElementById('overlay').classList.add('o');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('o');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});

// ===== 导出/导入 =====
function exp() {
  var d=D();
  var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='暗峰娱乐数据_'+fd(Date.now())+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出');
}
function imp(e){
  var file=e.target.files[0];
  if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.rooms||!d.sessions||!d.orders){toast('格式错误','e');return}
      save(d);
      toast('已导入');
      location.reload();
    }catch(err){toast('导入失败','e')}
  };
  r.readAsText(file);
}

// ===== 快捷导航 =====
function navTimer(){navTo('timer')}
function navOrder(sid){curOrderSid=sid;navTo('order')}
function navTo(p){
  document.querySelectorAll('.nav a').forEach(function(x){x.classList.remove('act')});
  var el=document.querySelector('[data-page="'+p+'"]');
  if(el)el.classList.add('act');
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('act')});
  document.getElementById(p).classList.add('act');
  render(p);
}
