<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗峰娱乐 · 包间管理系统</title>
<style>
/* ========== 基础重置 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d0d0d;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #242424;
  --bg-active: #2a2a2a;
  --text-primary: #f0f0f0;
  --text-secondary: #a0a0a0;
  --text-muted: #666;
  --accent: #f5c518;
  --accent-hover: #ffd84d;
  --accent-dim: #c49a00;
  --accent-bg: rgba(245, 197, 24, 0.1);
  --success: #3fb950;
  --success-bg: rgba(63,185,80,0.12);
  --warning: #d29922;
  --warning-bg: rgba(210,153,34,0.12);
  --danger: #f85149;
  --danger-bg: rgba(248,81,73,0.12);
  --border: #2a2a2a;
  --border-light: #1e1e1e;
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.35);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
}

/* ========== 布局 ========== */
#app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border-light);
}

.logo {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 2px;
  color: var(--accent);
}

.subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ========== 导航 ========== */
.nav {
  flex: 1;
  padding: 10px 8px;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.92rem;
  margin-bottom: 2px;
}

.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; border-left: 3px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

.nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.data-actions {
  display: flex;
  gap: 4px;
}

.data-actions .btn { flex: 1; font-size: 0.72rem; white-space: nowrap; }

/* ========== 主内容区 ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  min-height: 58px;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}

.menu-toggle:hover { color: var(--text-primary); background: var(--bg-hover); }

.page-title { font-size: 1.15rem; font-weight: 600; flex: 1; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.current-time {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.content {
  flex: 1;
  padding: 20px 24px;
  overflow-y: auto;
}

/* ========== 通用按钮 ========== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  font-weight: 500;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #0d0d0d;
  border-color: var(--accent);
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-success {
  background: #1a7f37;
  color: #fff;
  border-color: #1a7f37;
}
.btn-success:hover { background: #209143; }

.btn-danger {
  background: #bd2c2c;
  color: #fff;
  border-color: #bd2c2c;
}
.btn-danger:hover { background: #d03535; }

.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border);
}
.btn-outline:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-muted); }

.btn-warning {
  background: var(--accent);
  color: #0d0d0d;
  border-color: var(--accent);
  font-weight: 600;
}
.btn-warning:hover { background: var(--accent-hover); }

.btn-sm { padding: 5px 10px; font-size: 0.8rem; }
.btn-lg { padding: 10px 22px; font-size: 1rem; }

.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ========== 表单 ========== */
.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 5px;
  font-weight: 500;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-control {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.88rem;
  font-family: inherit;
  transition: border-color 0.15s;
}

.form-control:focus { outline: none; border-color: var(--accent); }
.form-control::placeholder { color: var(--text-muted); }

select.form-control { cursor: pointer; appearance: auto; }

/* ========== 卡片 ========== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
}

/* ========== 统计卡片 ========== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  border-left: 3px solid var(--accent);
}

.stat-card.blue { border-left-color: var(--accent); }
.stat-card.green { border-left-color: var(--success); }
.stat-card.orange { border-left-color: var(--warning); }
.stat-card.purple { border-left-color: #a371f7; }

.stat-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.stat-value {
  font-size: 1.6rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.stat-value.accent { color: var(--accent); }
.stat-value.success { color: var(--success); }
.stat-value.warning { color: var(--warning); }
.stat-value.danger { color: var(--danger); }

.stat-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ========== 包间网格 ========== */
.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}

.room-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}

.room-card:hover { border-color: var(--text-muted); }
.room-card.occupied { border-color: #da3633; box-shadow: 0 0 0 1px #da3633; }

.room-card-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-light);
}

.room-name {
  font-size: 0.95rem;
  font-weight: 600;
}

.room-badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.badge-idle { background: rgba(63,185,80,0.12); color: #3fb950; border: 1px solid rgba(63,185,80,0.25); }
.badge-occupied { background: rgba(248,81,73,0.12); color: #f85149; border: 1px solid rgba(248,81,73,0.25); }

.room-card-body {
  padding: 14px 16px;
}

.room-info-item {
  display: flex;
  justify-content: space-between;
  font-size: 0.82rem;
  margin-bottom: 6px;
}

.room-info-item .label { color: var(--text-muted); }
.room-info-item .value { color: var(--text-primary); }

.room-card-actions {
  padding: 10px 16px;
  border-top: 1px solid var(--border-light);
  display: flex;
  gap: 6px;
}

.room-card-actions .btn { flex: 1; justify-content: center; }

/* ========== 计时器界面 ========== */
.timer-display {
  font-size: 3.5rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  text-align: center;
  padding: 20px 0;
  letter-spacing: 2px;
}

.timer-display.running { color: var(--accent); }
.timer-display.stopped { color: var(--text-muted); }

.timer-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.timer-info-item {
  text-align: center;
  padding: 10px;
  background: var(--bg-primary);
  border-radius: var(--radius-sm);
}

.timer-info-item .label { font-size: 0.75rem; color: var(--text-muted); }
.timer-info-item .value { font-size: 1.05rem; font-weight: 600; margin-top: 2px; }

/* ========== 表格 ========== */
.table-wrap {
  overflow-x: auto;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

.table th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-muted);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  text-transform: none;
  white-space: nowrap;
}

.table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}

.table tr:hover td { background: rgba(255,255,255,0.02); }

.table .actions-cell {
  display: flex;
  gap: 4px;
}

/* ========== 订单列表 ========== */
.order-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 0.85rem;
}

.order-item:last-child { border-bottom: none; }

.order-item .name { flex: 1; }
.order-item .qty { color: var(--text-muted); margin: 0 10px; }
.order-item .price { font-weight: 600; margin-right: 10px; }
.order-item .remove { cursor: pointer; color: var(--danger); opacity: 0.6; }
.order-item .remove:hover { opacity: 1; }

.order-total {
  display: flex;
  justify-content: space-between;
  padding: 12px 0 0;
  margin-top: 10px;
  border-top: 2px solid var(--border);
  font-size: 1rem;
  font-weight: 700;
}

/* ========== 模态框 ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 460px;
  max-width: 94vw;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.modal-title { font-size: 1rem; font-weight: 600; }

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-close:hover { color: var(--text-primary); background: var(--bg-hover); }

.modal-body {
  padding: 20px;
  overflow-y: auto;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

/* ========== 空状态 ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state .text { font-size: 0.95rem; margin-bottom: 16px; }

/* ========== 标签 ========== */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.72rem;
  font-weight: 500;
}

.tag-ps { background: #003791; color: #fff; }
.tag-xbox { background: #107c10; color: #fff; }
.tag-switch { background: #e60012; color: #fff; }
.tag-general { background: var(--bg-hover); color: var(--text-secondary); }

/* ========== 历史会话项 ========== */
.history-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
}

.history-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.history-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 6px;
  font-size: 0.82rem;
}

.history-details .detail-item { color: var(--text-secondary); }
.history-details .detail-item strong { color: var(--text-primary); }

/* ========== 结算界面 ========== */
.settlement-section {
  background: var(--bg-primary);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
}

.settlement-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 0.88rem;
}

.settlement-row.total {
  border-top: 2px solid var(--border);
  margin-top: 8px;
  padding-top: 10px;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--accent);
}

/* ========== 搜索和过滤 ========== */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-bar .form-control { max-width: 200px; }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -240px;
    top: 0;
    bottom: 0;
    transition: left 0.25s;
    z-index: 50;
  }

  .sidebar.open { left: 0; }

  .menu-toggle { display: block; }
  .topbar { padding: 10px 14px; }
  .content { padding: 14px; }

  .form-row { grid-template-columns: 1fr; }
  .rooms-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }

  .timer-display { font-size: 2.5rem; }
}

/* ========== 通知/提示 ========== */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  animation: slideIn 0.2s ease;
  box-shadow: var(--shadow);
}

.toast-success { background: #1a7f37; color: #fff; }
.toast-error { background: #bd2c2c; color: #fff; }
.toast-info { background: var(--accent); color: #0d0d0d; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ========== 滚动条 ========== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== 结算弹窗中的金额编辑 ========== */
.amt-edit {
  display: flex;
  gap: 10px;
  align-items: center;
}

.amt-edit .form-control { width: 120px; }

/* ========== 订单快速添加 ========== */
.quick-add-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
  margin-bottom: 14px;
}

.quick-add-btn {
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-primary);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 0.82rem;
  font-family: inherit;
  transition: all 0.15s;
  text-align: center;
}

.quick-add-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}

/* ========== 时间线样式 ========== */
.session-timeline {
  padding: 0;
}

.session-timeline-item {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  border-left: 2px solid var(--border);
  padding-left: 16px;
  position: relative;
}

.session-timeline-item::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
  position: absolute;
  left: -6px;
  top: 11px;
}

.session-timeline-item.active::before { background: var(--accent); }

.timeline-time { font-size: 0.78rem; color: var(--text-muted); min-width: 70px; }
.timeline-content { flex: 1; font-size: 0.85rem; }

/* ========== 日期选择器 ========== */
.date-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.date-nav .btn { padding: 4px 10px; font-size: 0.82rem; }
.date-nav .current-date { font-size: 0.95rem; font-weight: 600; }

/* ========== 状态板（大屏 TV 显示） ========== */
.status-board {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  padding: 10px 0;
}

.status-board-card {
  border-radius: var(--radius-lg);
  padding: 20px 16px;
  text-align: center;
  transition: transform 0.15s;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.status-board-card.idle {
  background: linear-gradient(135deg, #1a3a1a, #1e4d1e);
  border: 2px solid #2ea043;
  box-shadow: 0 0 20px rgba(46, 160, 67, 0.15);
}

.status-board-card.occupied {
  background: linear-gradient(135deg, #3d1212, #4d1a1a);
  border: 2px solid #da3633;
  box-shadow: 0 0 20px rgba(218, 54, 51, 0.15);
}

.status-board-card .status-icon {
  font-size: 2.2rem;
  line-height: 1;
}

.status-board-card .room-name {
  font-size: 1.1rem;
  font-weight: 700;
  margin-top: 4px;
}

.status-board-card .room-type {
  font-size: 0.78rem;
  opacity: 0.7;
}

.status-board-card .status-label {
  font-size: 1.4rem;
  font-weight: 700;
  margin-top: 4px;
}

.status-board-card.idle .status-label { color: #3fb950; }
.status-board-card.occupied .status-label { color: #f85149; }

.status-board-card .customer-name {
  font-size: 0.92rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.status-board-card .timer-small {
  font-size: 1.05rem;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  margin-top: 2px;
}

.status-board-card.idle .timer-small { color: #3fb950; }
.status-board-card.occupied .timer-small { color: #f85149; }

/* 响应式：大屏多用空间 */
@media (min-width: 1200px) {
  .status-board {
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .status-board-card {
    min-height: 200px;
  }
  .status-board-card .status-icon { font-size: 3rem; }
  .status-board-card .room-name { font-size: 1.25rem; }
  .status-board-card .status-label { font-size: 1.6rem; }
}

/* 状态板专用顶部栏（全屏友好） */
.statusboard-fullscreen .topbar { display: none; }
.statusboard-fullscreen .sidebar { display: none; }
.statusboard-fullscreen .main { margin-left: 0; }
.statusboard-fullscreen .content { padding: 20px 30px; }

</style>
</head>
<body>

<script>
/* ========== 暗峰娱乐 · 数据管理层 ========== */
const Store = {
  STORAGE_KEY: 'anfeng_store_data',

  /** 默认数据 */
  defaults() {
    return {
      rooms: [
        { id: 'r1', name: 'PS5 1号包间', type: 'ps5', hourlyRate: 15, deposit: 0, sortOrder: 1 },
        { id: 'r2', name: 'PS5 2号包间', type: 'ps5', hourlyRate: 15, deposit: 0, sortOrder: 2 },
        { id: 'r3', name: 'PS4 1号包间', type: 'ps4', hourlyRate: 10, deposit: 0, sortOrder: 3 },
        { id: 'r4', name: 'PS4 2号包间', type: 'ps4', hourlyRate: 10, deposit: 0, sortOrder: 4 },
        { id: 'r5', name: 'Switch 包间',   type: 'switch', hourlyRate: 12, deposit: 0, sortOrder: 5 },
      ],
      sessions: [],
      orders: [],
      nextId: { rooms: 6, sessions: 1, orders: 1 },
      createdAt: Date.now(),
    };
  },

  /** 加载数据 */
  load() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        const def = this.defaults();
        for (const key of Object.keys(def)) {
          if (!(key in data)) data[key] = def[key];
        }
        return data;
      }
    } catch (e) {
      console.warn('加载数据失败，使用默认值', e);
    }
    return this.defaults();
  },

  /** 保存数据 */
  save(data) {
    try {
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      console.error('保存数据失败', e);
      showToast('数据保存失败，请检查浏览器存储空间', 'error');
    }
  },

  /** 获取所有数据（简写） */
  get() { return this.load(); },

  /** ---- 包间 CRUD ---- */
  getRooms() { return this.get().rooms; },

  getRoom(roomId) {
    return this.getRooms().find(r => r.id === roomId);
  },

  addRoom(name, type, hourlyRate, deposit = 0) {
    const data = this.get();
    const id = 'r' + (data.nextId.rooms++);
    data.rooms.push({
      id, name, type, hourlyRate: Number(hourlyRate), deposit: Number(deposit),
      sortOrder: data.rooms.length + 1,
    });
    this.save(data);
    return id;
  },

  updateRoom(roomId, updates) {
    const data = this.get();
    const room = data.rooms.find(r => r.id === roomId);
    if (!room) return false;
    Object.assign(room, updates);
    this.save(data);
    return true;
  },

  deleteRoom(roomId) {
    const data = this.get();
    const active = data.sessions.find(s => s.roomId === roomId && s.status === 'active');
    if (active) {
      showToast('该包间有正在进行中的计时，无法删除', 'error');
      return false;
    }
    data.rooms = data.rooms.filter(r => r.id !== roomId);
    this.save(data);
    return true;
  },

  /** ---- 会话 CRUD ---- */
  getSessions() { return this.get().sessions; },

  getSession(sessionId) {
    return this.getSessions().find(s => s.id === sessionId);
  },

  /** 获取当前活跃的会话 */
  getActiveSessions() {
    return this.getSessions().filter(s => s.status === 'active');
  },

  /** 获取指定包间的活跃会话 */
  getActiveSessionForRoom(roomId) {
    return this.getSessions().find(s => s.roomId === roomId && s.status === 'active');
  },

  /** 开启一个新会话 */
  startSession(roomId, customerName = '', customerPhone = '', deposit = 0) {
    const data = this.get();
    const existing = data.sessions.find(s => s.roomId === roomId && s.status === 'active');
    if (existing) {
      showToast('该包间已有正在进行的计时', 'error');
      return null;
    }
    const id = 's' + (data.nextId.sessions++);
    const session = {
      id,
      roomId,
      customerName: customerName || '散客',
      customerPhone,
      startTime: Date.now(),
      endTime: null,
      status: 'active',
      totalTime: 0,
      actualTime: 0,
      timeFee: 0,
      deposit: Number(deposit),
      orderTotal: 0,
      totalAmount: 0,
      discountPercent: 0,
      discountFixed: 0,
      customHours: null,
      customRate: null,
      autoHours: 0,
      notes: '',
      createdAt: Date.now(),
    };
    data.sessions.push(session);
    this.save(data);
    return id;
  },

  /**
   * 结束会话（结算）
   * @param {string} sessionId
   * @param {number} endTime - 结束时间戳
   * @param {object} options - 自定义结算参数
   * @param {number} options.customHours  - 手动设置结算小时数（不传则自动计算）
   * @param {number} options.customRate   - 手动设置费率（不传则用包间标准费率）
   * @param {number} options.discountPercent - 折扣百分比 0-100
   * @param {number} options.discountFixed   - 固定减免金额
   */
  endSession(sessionId, endTime = Date.now(), options = {}) {
    const { customHours, customRate, discountPercent, discountFixed } = options;
    const data = this.get();
    const session = data.sessions.find(s => s.id === sessionId);
    if (!session || session.status !== 'active') return null;

    const room = data.rooms.find(r => r.id === session.roomId);
    if (!room) return null;

    const durationMs = endTime - session.startTime;
    const durationMin = Math.ceil(durationMs / 60000);
    // 自动计算：不足1小时按1小时算
    const autoHours = Math.ceil(durationMin / 60);

    // 手动值优先（允许 0 作为合法手动输入）
    const hasCustomHours = (customHours !== undefined && customHours !== null && customHours !== '');
    const hasCustomRate  = (customRate  !== undefined && customRate  !== null && customRate  !== '');

    const billedHours = hasCustomHours ? Number(customHours) : autoHours;
    const billedRate  = hasCustomRate  ? Number(customRate)  : room.hourlyRate;

    session.endTime = endTime;
    session.status = 'completed';
    session.totalTime = billedHours * 60;     // 结算所用的总分钟数
    session.actualTime = durationMin;          // 实际时长（仅参考）

    // 计时费用
    session.timeFee = billedHours * billedRate;

    // 订单总额
    const sessionOrders = data.orders.filter(o => o.sessionId === sessionId);
    session.orderTotal = sessionOrders.reduce((sum, o) => sum + o.price * o.quantity, 0);

    // 折扣计算
    const pct = (discountPercent !== undefined && discountPercent !== null && discountPercent !== '')
      ? Number(discountPercent) : 0;
    const fix = (discountFixed !== undefined && discountFixed !== null && discountFixed !== '')
      ? Number(discountFixed) : 0;
    session.discountPercent = pct;
    session.discountFixed = fix;

    const subtotal = session.timeFee + session.orderTotal;
    const discountAmount = Math.round(subtotal * pct / 100 * 100) / 100 + fix;

    // 应收 = 计时费 + 商品费 - 押金 - 折扣
    session.totalAmount = Math.max(0, Math.round((subtotal - session.deposit - discountAmount) * 100) / 100);

    // 记录自定义值供历史查看
    session.customHours = hasCustomHours ? billedHours : null;
    session.customRate  = hasCustomRate  ? billedRate  : null;
    session.autoHours = autoHours;

    this.save(data);
    return session;
  },

  /** 删除会话 */
  deleteSession(sessionId) {
    const data = this.get();
    data.sessions = data.sessions.filter(s => s.id !== sessionId);
    data.orders = data.orders.filter(o => o.sessionId !== sessionId);
    this.save(data);
  },

  /** 获取今天的会话 */
  getTodaySessions() {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const todayEnd = todayStart + 86400000;
    return this.getSessions().filter(s => {
      const t = s.status === 'active' ? s.startTime : (s.endTime || s.startTime);
      return t >= todayStart && t < todayEnd;
    });
  },

  /** 获取指定日期的已结算会话 */
  getCompletedSessionsByDate(dateStr) {
    const start = new Date(dateStr + 'T00:00:00+08:00').getTime();
    const end = start + 86400000;
    return this.getSessions().filter(s => {
      if (s.status !== 'completed' || !s.endTime) return false;
      return s.endTime >= start && s.endTime < end;
    });
  },

  /** 获取所有已结算会话 */
  getAllCompletedSessions() {
    return this.getSessions().filter(s => s.status === 'completed');
  },

  /** ---- 订单 CRUD ---- */
  getOrders() { return this.get().orders; },

  getOrdersForSession(sessionId) {
    return this.getOrders().filter(o => o.sessionId === sessionId);
  },

  addOrder(sessionId, itemName, price, quantity = 1) {
    const data = this.get();
    const id = 'o' + (data.nextId.orders++);
    data.orders.push({
      id, sessionId, itemName, price: Number(price), quantity: Number(quantity),
      time: Date.now(),
    });
    this.save(data);
    return id;
  },

  removeOrder(orderId) {
    const data = this.get();
    data.orders = data.orders.filter(o => o.id !== orderId);
    this.save(data);
  },

  /** 获取所有已完成会话的订单 */
  getCompletedOrders() {
    const completedIds = this.getAllCompletedSessions().map(s => s.id);
    return this.getOrders().filter(o => completedIds.includes(o.sessionId));
  },

  /** ---- 统计数据 ---- */
  getStats() {
    const data = this.get();
    const rooms = data.rooms;
    const activeSessions = data.sessions.filter(s => s.status === 'active');
    const todayCompleted = data.sessions.filter(s => {
      if (s.status !== 'completed' || !s.endTime) return false;
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      return s.endTime >= start && s.endTime < start + 86400000;
    });

    const todayRevenue = todayCompleted.reduce((sum, s) => sum + s.totalAmount, 0);
    const totalRevenue = data.sessions
      .filter(s => s.status === 'completed')
      .reduce((sum, s) => sum + s.totalAmount, 0);

    return {
      totalRooms: rooms.length,
      activeRooms: activeSessions.length,
      idleRooms: rooms.length - activeSessions.length,
      todaySessions: todayCompleted.length,
      todayRevenue,
      totalRevenue,
      activeSessions: activeSessions.length,
    };
  },

  /** ---- 重置所有数据 ---- */
  reset() {
    const def = this.defaults();
    this.save(def);
    return def;
  },
};

/* ========== 工具函数 ========== */

/** 格式化时间 HH:mm:ss */
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

/** 格式化日期 YYYY-MM-DD */
function formatDate(ts) {
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

/** 格式化日期时间 */
function formatDateTime(ts) {
  return formatDate(ts) + ' ' + formatTime(ts);
}

/** 格式化秒数为 HH:MM:SS */
function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

/** 计算两个时间戳之间的时长（秒） */
function durationBetween(start, end) {
  return Math.floor((end - start) / 1000);
}

/** 根据类型返回显示名 */
function getTypeLabel(type) {
  const map = { ps5: 'PS5', ps4: 'PS4', switch: 'Switch', general: '通用' };
  return map[type] || type;
}

/** 根据类型返回标签 class */
function getTypeTagClass(type) {
  const map = { ps5: 'tag-ps', ps4: 'tag-ps', switch: 'tag-switch', general: 'tag-general' };
  return map[type] || 'tag-general';
}

/** Toast 通知 */
function showToast(msg, type = 'info') {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; }, 2500);
  setTimeout(() => el.remove(), 3000);
}

/** 格式化金额 */
function formatMoney(amount) {
  return '¥' + Number(amount).toFixed(2);
}

/* ========== 导出/导入数据 ========== */
function exportData() {
  const data = Store.get();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `暗峰娱乐数据_${formatDate(Date.now())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.rooms || !data.sessions || !data.orders) {
        showToast('数据格式不正确', 'error');
        return;
      }
      Store.save(data);
      showToast('数据已导入，页面即将刷新', 'success');
      setTimeout(() => location.reload(), 800);
    } catch (err) {
      showToast('导入失败：' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAllData() {
  if (!confirm('确定要重置所有数据吗？此操作不可撤销！')) return;
  Store.reset();
  showToast('数据已重置', 'info');
  setTimeout(() => location.reload(), 500);
}

/* ========== 暗峰娱乐 · 应用主逻辑 ========== */

let appState = {
  currentPage: 'dashboard',
  timerIntervals: {},
  currentDate: new Date(),
  selectedOrderSessionId: null,
};

/* ========== 初始化 ========== */
document.addEventListener('DOMContentLoaded', () => {
  initNavigation();
  navigateTo('dashboard');
  updateClock();
  setInterval(updateClock, 1000);
});

function updateClock() {
  const el = document.getElementById('currentTime');
  if (el) el.textContent = new Date().toLocaleString('zh-CN', { hour12: false });
}

/* ========== 导航 ========== */
function initNavigation() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      navigateTo(page);
      document.getElementById('sidebar').classList.remove('open');
    });
  });

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });
}

function navigateTo(page) {
  appState.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');

  const titles = {
    dashboard: '仪表盘',
    rooms: '包间管理',
    tracking: '计时管理',
    orders: '订单管理',
    history: '历史记录',
    statusboard: '状态板',
  };
  document.getElementById('pageTitle').textContent = titles[page] || '暗峰娱乐';

  const content = document.getElementById('content');
  switch (page) {
    case 'dashboard': renderDashboard(content); break;
    case 'rooms': renderRooms(content); break;
    case 'tracking': renderTracking(content); break;
    case 'orders': renderOrders(content); break;
    case 'history': renderHistory(content); break;
    case 'statusboard': renderStatusBoard(content); break;
  }
}

/* ============================================================
   仪表盘
   ============================================================ */
function renderDashboard(el) {
  const stats = Store.getStats();
  const rooms = Store.getRooms();
  const activeSessions = Store.getActiveSessions();

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label">包间总数</div>
        <div class="stat-value accent">${stats.totalRooms}</div>
        <div class="stat-sub">空闲 ${stats.idleRooms} · 使用中 ${stats.activeRooms}</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">今日上机</div>
        <div class="stat-value success">${stats.todaySessions}</div>
        <div class="stat-sub">当前 ${stats.activeRooms} 间使用中</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">今日营收</div>
        <div class="stat-value warning">${formatMoney(stats.todayRevenue)}</div>
        <div class="stat-sub">累计 ${formatMoney(stats.totalRevenue)}</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">使用中包间</div>
        <div class="stat-value" style="color:#a371f7">${stats.activeRooms}</div>
        <div class="stat-sub">空闲 ${stats.idleRooms} 间</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-header">
        <span class="card-title">包间状态一览</span>
        <button class="btn btn-sm btn-primary" onclick="navigateTo('tracking')">⏱️ 管理计时</button>
      </div>
      <div class="rooms-grid" id="dashboardRooms">
        ${renderRoomCards(rooms, activeSessions)}
      </div>
    </div>
  `;
}

function renderRoomCards(rooms, activeSessions) {
  if (!rooms || rooms.length === 0) {
    return `<div class="empty-state"><div class="icon">🛋️</div><div class="text">还没有包间，请先添加包间</div></div>`;
  }

  return rooms.map(room => {
    const active = activeSessions.find(s => s.roomId === room.id);
    const isOccupied = !!active;

    return `
      <div class="room-card ${isOccupied ? 'occupied' : ''}">
        <div class="room-card-header">
          <span class="room-name">${room.name}</span>
          <span class="tag ${getTypeTagClass(room.type)}">${getTypeLabel(room.type)}</span>
        </div>
        <div class="room-card-body">
          <div class="room-info-item">
            <span class="label">状态</span>
            <span class="room-badge ${isOccupied ? 'badge-occupied' : 'badge-idle'}">
              ${isOccupied ? '有客' : '空闲'}
            </span>
          </div>
          <div class="room-info-item">
            <span class="label">收费标准</span>
            <span class="value">${room.hourlyRate} 元/小时</span>
          </div>
          ${isOccupied ? `
          <div class="room-info-item">
            <span class="label">顾客</span>
            <span class="value">${active.customerName}</span>
          </div>
          <div class="room-info-item">
            <span class="label">已用时长</span>
            <span class="value timer-value" data-session-id="${active.id}">--:--:--</span>
          </div>
          ` : ''}
        </div>
        <div class="room-card-actions">
          ${isOccupied
            ? `<button class="btn btn-sm btn-success" onclick="navigateTo('orders')">🧾 订单</button>
               <button class="btn btn-sm btn-danger" onclick="endSessionModal('${active.id}')">结账</button>`
            : `<button class="btn btn-sm btn-primary" onclick="openStartSession('${room.id}')">▶ 开台</button>`
          }
        </div>
      </div>
    `;
  }).join('');
}

/* ============================================================
   包间管理

/* ============================================================
   状态板（大屏 TV 友好）
   ============================================================ */
function renderStatusBoard(el) {
  const rooms = Store.getRooms();
  const activeSessions = Store.getActiveSessions();

  el.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <h3 style="font-size:1.3rem;font-weight:700;">📺 包间状态板</h3>
      <span style="font-size:1.1rem;font-weight:600;color:var(--text-muted);">${new Date().toLocaleString("zh-CN",{hour12:false})}</span>
    </div>
    <div class="status-board">
      ${rooms.length === 0 ? `<div class="empty-state"><div class="icon">🛋️</div><div class="text">暂无包间</div></div>` :
        rooms.map(room => {
          const session = activeSessions.find(s => s.roomId === room.id);
          const isOccupied = !!session;
          return `
            <div class="status-board-card ${isOccupied ? "occupied" : "idle"}">

/* ========== 计时器逻辑 ========== */
function startTimer(sessionId) {
  if (appState.timerIntervals[sessionId]) {
    clearInterval(appState.timerIntervals[sessionId]);
  }

  const session = Store.getSession(sessionId);
  if (!session || session.status !== 'active') return;

  const room = Store.getRoom(session.roomId);
  if (!room) return;

  const update = () => {
    const elapsed = durationBetween(session.startTime, Date.now());
    const displayEl = document.getElementById(`timer-${sessionId}`);
    const feeEl = document.getElementById(`fee-${sessionId}`);

    if (displayEl) {
      displayEl.textContent = formatDuration(elapsed);
    }
    if (feeEl) {
      const hours = Math.ceil(elapsed / 3600);
      feeEl.textContent = formatMoney(hours * room.hourlyRate);
    }

    const dashTimer = document.querySelector(`.timer-value[data-session-id="${sessionId}"]`);
    if (dashTimer) dashTimer.textContent = formatDuration(elapsed);

    const runningFee = document.getElementById(`running-fee-${sessionId}`);
    if (runningFee) {
      const hours = Math.ceil(elapsed / 3600);
      runningFee.textContent = formatMoney(hours * room.hourlyRate);
    }
  };

  update();
  appState.timerIntervals[sessionId] = setInterval(update, 1000);
}

function stopTimer(sessionId) {
  if (appState.timerIntervals[sessionId]) {
    clearInterval(appState.timerIntervals[sessionId]);
    delete appState.timerIntervals[sessionId];
  }
}

/** 实时重算结算金额 */
function recalcSettlement() {
  const hours = parseFloat(document.getElementById('setHours')?.value) || 0;
  const rate  = parseFloat(document.getElementById('setRate')?.value) || 0;
  const discPct = parseFloat(document.getElementById('discPct')?.value) || 0;
  const discFix = parseFloat(document.getElementById('discFix')?.value) || 0;

  const breakdown = document.getElementById('settlementBreakdown');
  if (!breakdown) return;

  const data = breakdown._settlementData || { orderTotal: 0, deposit: 0 };
  // 尝试从 modal 的 dataset 读取，否则从 DOM 读取
  const orderTotal = data.orderTotal;
  const deposit = data.deposit;

  const timeFee = hours * rate;
  const subtotal = timeFee + orderTotal;
  const discountAmount = Math.round(subtotal * discPct / 100 * 100) / 100 + discFix;
  const total = Math.max(0, subtotal - deposit - discountAmount);

  document.getElementById('lineTimeFee').textContent = formatMoney(timeFee);

  const discLine = document.getElementById('discountLine');
  const discEl = document.getElementById('lineDiscount');
  if (discountAmount > 0) {
    discLine.style.display = 'flex';
    discEl.textContent = '-' + formatMoney(discountAmount);
  } else {
    discLine.style.display = 'none';
  }

  document.getElementById('lineTotal').textContent = formatMoney(total);
}

  const daySessions = sessions.length;

  const monthStart = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1).getTime();
  const monthEnd = new Date(selectedDate.getFullYear(), selectedDate.getMonth() + 1, 1).getTime();
  const monthSessions = Store.getAllCompletedSessions().filter(s => {
    return s.endTime >= monthStart && s.endTime < monthEnd;
  });
  const monthRevenue = monthSessions.reduce((sum, s) => sum + s.totalAmount, 0);

  el.innerHTML = `
    <div class="stats-grid" style="margin-bottom:16px;">
      <div class="stat-card green">
        <div class="stat-label">${dateStr} 已完成订单</div>
        <div class="stat-value success">${daySessions}</div>
        <div class="stat-sub">单</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">${dateStr} 营收</div>
        <div class="stat-value warning">${formatMoney(dayRevenue)}</div>
        <div class="stat-sub"></div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">本月营收</div>
        <div class="stat-value accent">${formatMoney(monthRevenue)}</div>
        <div class="stat-sub">${monthSessions.length} 单</div>
      </div>
    </div>

    <div class="date-nav">
      <button class="btn btn-outline btn-sm" onclick="changeHistoryDate(-1)">‹ 前一天</button>
      <span class="current-date">${dateStr}</span>
      <button class="btn btn-outline btn-sm" onclick="changeHistoryDate(1)">后一天 ›</button>
      <button class="btn btn-outline btn-sm" onclick="changeHistoryDate(0)">今天</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">📜 结算记录 — ${dateStr}</span>
      </div>
      ${sessions.length === 0 ? `
        <div class="empty-state">
          <div class="icon">📅</div>
          <div class="text">该日期暂无结算记录</div>
        </div>
      ` : `
        ${sessions.map(s => {
          const room = Store.getRoom(s.roomId);
          const orders = Store.getOrdersForSession(s.id);
          const orderDetails = orders.length > 0
            ? orders.map(o => `${o.itemName}×${o.quantity}`).join('、')
            : '无';

          // 折扣信息
          const hasDiscount = (s.discountPercent > 0 || s.discountFixed > 0);
          const discountParts = [];
          if (s.discountPercent > 0) discountParts.push(`${s.discountPercent}%折扣`);
          if (s.discountFixed > 0) discountParts.push(`减¥${s.discountFixed}`);
          const discountText = hasDiscount ? discountParts.join('+') : null;

          // 自定义时间/费率信息
          const hasCustom = (s.customHours !== null || s.customRate !== null);

          // 计算原价（打折前的应收）
          const originalAmount = s.timeFee + s.orderTotal - s.deposit;

          return `
            <div class="history-item">
              <div class="history-item-header">
                <span><strong>${room ? room.name : '已删除包间'}</strong></span>
                <span class="tag ${room ? getTypeTagClass(room.type) : 'tag-general'}">
                  ${room ? getTypeLabel(room.type) : '通用'}
                </span>
              </div>
              <div class="history-details">
                <div class="detail-item">顾客：<strong>${s.customerName}</strong></div>
                <div class="detail-item">上机：<strong>${formatTime(s.startTime)}</strong></div>
                <div class="detail-item">下机：<strong>${formatTime(s.endTime)}</strong></div>
                <div class="detail-item">实际时长：<strong>${s.actualTime || s.totalTime}分钟</strong></div>
                <div class="detail-item">结算时长：<strong>${s.totalTime}分钟 ${hasCustom ? '(手动调整)' : ''}</strong></div>
                <div class="detail-item">计时费率：<strong>${s.customRate ? s.customRate + '元/时' : (room ? room.hourlyRate + '元/时' : '—')}</strong></div>
                <div class="detail-item">计时费：<strong>${formatMoney(s.timeFee)}</strong></div>
                <div class="detail-item">商品：<strong>${orderDetails} (${formatMoney(s.orderTotal)})</strong></div>
                ${s.deposit > 0 ? `<div class="detail-item">押金：<strong>${formatMoney(s.deposit)}</strong></div>` : ''}
                ${discountText ? `<div class="detail-item" style="color:var(--success);">折扣：<strong>-${discountText}</strong></div>` : ''}
                <div class="detail-item" style="color:var(--accent);font-weight:700;font-size:0.92rem;">
                  实收：<strong>${formatMoney(s.totalAmount)}</strong>
                  ${originalAmount > s.totalAmount ? `<span style="color:var(--text-muted);font-weight:400;font-size:0.78rem;"> (原价 ${formatMoney(originalAmount)})</span>` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      `}
    </div>
  `;
}

function changeHistoryDate(delta) {
  const d = new Date(appState.currentDate);
  if (delta === 0) {
    appState.currentDate = new Date();
  } else {
    d.setDate(d.getDate() + delta);
    appState.currentDate = d;
  }
  renderHistory(document.getElementById('content'));
}

/* ========== 包间管理弹窗 ========== */
function showAddRoomModal() {
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');

  modalTitle.textContent = '＋ 添加包间';
  modalBody.innerHTML = `
    <div class="form-group">
      <label>包间名称</label>
      <input class="form-control" id="roomName" placeholder="例如：PS5 VIP包间">
    </div>
    <div class="form-group">
      <label>类型</label>
      <select class="form-control" id="roomType">
        <option value="ps5">PS5</option>
        <option value="ps4">PS4</option>
        <option value="switch">Switch</option>
        <option value="general">通用</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>收费标准（元/小时）</label>
        <input class="form-control" id="roomRate" type="number" min="0" step="5" value="15">
      </div>
      <div class="form-group">
        <label>押金（元）</label>
        <input class="form-control" id="roomDeposit" type="number" min="0" step="10" value="0">
      </div>
    </div>
    <div style="margin-top:16px; display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-lg" onclick="confirmAddRoom()">确认添加</button>
    </div>
  `;

  openModal();
}

function confirmAddRoom() {
  const name = document.getElementById('roomName').value.trim();
  const type = document.getElementById('roomType').value;
  const rate = parseFloat(document.getElementById('roomRate').value) || 15;
  const deposit = parseFloat(document.getElementById('roomDeposit').value) || 0;

  if (!name) { showToast('请输入包间名称', 'error'); return; }

  Store.addRoom(name, type, rate, deposit);
  closeModal();
  showToast('包间已添加', 'success');
  navigateTo('rooms');
}

function showEditRoomModal(roomId) {
  const room = Store.getRoom(roomId);
  if (!room) return;

  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');

  modalTitle.textContent = `编辑 — ${room.name}`;
  modalBody.innerHTML = `
    <div class="form-group">
      <label>包间名称</label>
      <input class="form-control" id="roomName" value="${room.name}">
    </div>
    <div class="form-group">
      <label>类型</label>
      <select class="form-control" id="roomType">
        <option value="ps5" ${room.type === 'ps5' ? 'selected' : ''}>PS5</option>
        <option value="ps4" ${room.type === 'ps4' ? 'selected' : ''}>PS4</option>
        <option value="switch" ${room.type === 'switch' ? 'selected' : ''}>Switch</option>
        <option value="general" ${room.type === 'general' ? 'selected' : ''}>通用</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>收费标准（元/小时）</label>
        <input class="form-control" id="roomRate" type="number" min="0" step="5" value="${room.hourlyRate}">
      </div>
      <div class="form-group">
        <label>押金（元）</label>
        <input class="form-control" id="roomDeposit" type="number" min="0" step="10" value="${room.deposit || 0}">
      </div>
    </div>
    <div style="margin-top:16px; display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-lg" onclick="confirmEditRoom('${roomId}')">保存修改</button>
    </div>
  `;

  openModal();
}

function confirmEditRoom(roomId) {
  const name = document.getElementById('roomName').value.trim();
  const type = document.getElementById('roomType').value;
  const rate = parseFloat(document.getElementById('roomRate').value) || 15;
  const deposit = parseFloat(document.getElementById('roomDeposit').value) || 0;

  if (!name) { showToast('请输入包间名称', 'error'); return; }

  Store.updateRoom(roomId, { name, type, hourlyRate: rate, deposit });
  closeModal();
  showToast('包间信息已更新', 'success');
  navigateTo('rooms');
}

function deleteRoomConfirm(roomId) {
  const room = Store.getRoom(roomId);
  if (!room) return;
  if (!confirm(`确定要删除「${room.name}」吗？`)) return;

  if (Store.deleteRoom(roomId)) {
    showToast('包间已删除', 'info');
    navigateTo('rooms');
  }
}

/* ========== 模态框控制 ========== */
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

</script>
</body>
</html>
